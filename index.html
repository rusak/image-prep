<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Marketplace Image Prep</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="dropzone">
    <h2>Drag & Drop Clothing Images</h2>
  </div>

  <div id="controls">
    <label>
      Background Tone:
      <input type="range" id="bgTone" min="230" max="255" value="245">
    </label>

    <label>
      Shadow Intensity:
      <input type="range" id="shadow" min="5" max="80" value="25">
    </label>

    <label>
      Enhancement:
      <input type="range" id="enhance" min="0" max="100" value="60">
    </label>

    <button id="downloadAll">Download All</button>
  </div>

  <div id="grid"></div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script type="module" src="app.js"></script>

</body>
</html>
