<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marketplace Image Prep</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="dropzone">
    <h2>Drag & Drop or Tap to Upload</h2>
    <input type="file" id="fileInput" multiple accept="image/*" hidden />
  </div>

  <div id="controls">

    <label>
      Background:
      <select id="bgMode">
        <option value="neutral">Neutral</option>
        <option value="white">Pure White</option>
      </select>
    </label>

    <label>
      Enhancement:
      <input type="range" id="enhance" min="0" max="100" value="60">
    </label>

    <label>
      Wrinkle Boost:
      <input type="range" id="wrinkle" min="0" max="100" value="40">
    </label>

    <label>
      Cloud Mode:
      <input type="checkbox" id="cloudMode">
    </label>

    <button id="downloadAll">Download All</button>
  </div>

  <div id="grid"></div>

  <!-- Preview Modal -->
  <div id="previewModal">
    <img id="previewImage" />
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script type="module" src="app.js"></script>

</body>
</html>
